name: Deploy FamSub Backend

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'OPTIONAL: Specify an existing image tag to re-deploy.'
        required: false
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.get_tag.outputs.tag }}
      build_needed: ${{ steps.get_tag.outputs.build_needed }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build JAR with Gradle
        run: ./gradlew bootJar -x test --no-daemon

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image tag
        id: get_tag
        run: |
          if [[ -n "${{ inputs.image_tag }}" ]]; then
            echo "tag=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
            echo "build_needed=false" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"
            echo "build_needed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push Docker image
        if: steps.get_tag.outputs.build_needed == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ghcr.io/okuzan/fam-sub-be:${{ steps.get_tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: always() && (needs.build.result == 'success' || github.event_name == 'workflow_dispatch')
    environment: production
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout almonium-infra repository
        uses: actions/checkout@v5
        with:
          repository: almonium-platform/almonium-infra
          path: almonium-infra
          ssh-key: ${{ secrets.INFRA_REPO_CHECKOUT_KEY }}

      - name: Set up SSH Agent for Ansible to connect to VM
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.CLOUD_KEY }}

      - name: Install Ansible and Docker collection
        run: |
          python -m venv ansible_venv
          source ansible_venv/bin/activate
          pip install ansible
          ansible-galaxy collection install community.docker

      - name: Run Ansible Playbook
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          VAULT_PASS_FAM_SUB_PROD: ${{ secrets.ANSIBLE_VAULT_PASSWORD_FAM_SUB_PROD }}
        run: |
          set -euo pipefail
          
          source ansible_venv/bin/activate
          cd almonium-infra/ansible
          
          test -n "${VAULT_PASS_FAM_SUB_PROD:-}" || { echo "Vault secret is empty/missing"; exit 1; }
          
          VAULT_FILE="vault_pass_fam_sub_env.txt"
          trap 'rm -f "$VAULT_FILE"' EXIT
          
          printf "%s" "$VAULT_PASS_FAM_SUB_PROD" > "$VAULT_FILE"
          chmod 600 "$VAULT_FILE"
          
          # Debug: check vault file content (remove after fixing)
          echo "Vault file exists: $(test -f "$VAULT_FILE" && echo yes || echo no)"
          echo "Vault file size: $(wc -c < "$VAULT_FILE")"
          
          ansible-playbook playbook-deploy-fam-sub-be.yaml \
            -i inventory/hosts.ini \
            --limit almonium \
            --vault-id fam_sub_prod@"$VAULT_FILE" \
            --extra-vars "deploy_environment=prod" \
            --extra-vars "deploy_image_tag=${{ needs.build.outputs.image_tag }}" \
            --extra-vars "deploy_gh_actor=${{ github.actor }}" \
            --extra-vars "deploy_gh_token=${{ secrets.GITHUB_TOKEN }}"
